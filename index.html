<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Air Canvas</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-bg: rgba(22, 22, 26, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-glow: #00ffcc;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed; /* Prevents bounce scrolling on mobile */
        }

        /* Fixed Mobile-Optimized Header Panel */
        #ui-container {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            z-index: 10;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
        }

        .controls-wrapper {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #8e8e93;
            font-weight: 700;
        }

        /* Customizing elements for easy finger-tapping */
        .color-picker-wrapper {
            position: relative;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
            overflow: hidden;
        }

        input[type="color"] {
            position: absolute;
            top: -5px;
            left: -5px;
            width: 46px;
            height: 46px;
            border: none;
            background: none;
            cursor: pointer;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 90px;
            background: rgba(255, 255, 255, 0.1);
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 0 8px rgba(255,255,255,0.5);
            cursor: pointer;
        }

        /* Clean Minimalist Status Badge */
        #status-badge {
            padding: 8px 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .status-draw { background: rgba(0, 255, 204, 0.15); color: #00ffcc; border: 1px solid rgba(0, 255, 204, 0.3); }
        .status-erase { background: rgba(255, 0, 85, 0.15); color: #ff0055; border: 1px solid rgba(255, 0, 85, 0.3); }
        .status-pause { background: rgba(255, 204, 0, 0.15); color: #ffcc00; border: 1px solid rgba(255, 204, 0, 0.3); }
        .status-loading { background: rgba(255, 255, 255, 0.05); color: #8e8e93; border: 1px solid var(--border-color); }

        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
        }

        /* Mirror elements layout */
        video, #paintCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #paintCanvas {
            z-index: 2;
            background: transparent;
        }

        /* HIDDEN Video: Solves the gray screen issue completely while keeping tracking functional */
        video {
            z-index: 1;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="controls-wrapper">
            <div class="control-group">
                <label for="colorPicker">Color</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="colorPicker" value="#00ffcc">
                </div>
            </div>
            <div class="control-group">
                <label for="brushThickness">Size</label>
                <input type="range" id="brushThickness" min="5" max="45" value="18">
            </div>
        </div>
        <div id="status-badge" class="status-loading">Initializing AI...</div>
    </div>

    <div id="canvas-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="paintCanvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('paintCanvas');
        const ctx = canvasElement.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const brushThickness = document.getElementById('brushThickness');
        const statusBadge = document.getElementById('status-badge');

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
            setupCanvasProperties();
        }

        function setupCanvasProperties() {
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function getDistance(pt1, pt2) {
            return Math.hypot(pt1.x - pt2.x, pt1.y - pt2.y);
        }

        function onResults(results) {
            if (statusBadge.classList.contains('status-loading')) {
                statusBadge.textContent = 'Ready';
                statusBadge.className = 'status-pause';
            }

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                return; 
            }

            const landmarks = results.multiHandLandmarks[0];
            
            const wrist = landmarks[0];
            const indexTip = landmarks[8];
            const indexPip = landmarks[6];
            const middleTip = landmarks[12];
            const ringTip = landmarks[16];
            const pinkyTip = landmarks[20];

            // Convert coordinates smoothly
            const currentX = indexTip.x * canvasElement.width;
            const currentY = indexTip.y * canvasElement.height;

            // Gesture logic scales to tracking depth
            const baseDist = getDistance(wrist, indexPip); 
            const isIndexExtended = getDistance(wrist, indexTip) > baseDist;
            const isMiddleExtended = getDistance(wrist, middleTip) > baseDist;
            const isRingExtended = getDistance(wrist, ringTip) > baseDist;
            const isPinkyExtended = getDistance(wrist, pinkyTip) > baseDist;

            let gesture = 'pause';

            if (isIndexExtended && !isMiddleExtended && !isRingExtended && !isPinkyExtended) {
                gesture = 'draw';
            } else if (isIndexExtended && isMiddleExtended && isRingExtended && isPinkyExtended) {
                gesture = 'erase';
            }

            // Execute Actions
            if (gesture === 'draw') {
                statusBadge.textContent = 'Drawing';
                statusBadge.className = 'status-draw';

                if (isDrawing) {
                    ctx.beginPath();
                    ctx.moveTo(lastX, lastY);
                    ctx.lineTo(currentX, currentY);

                    const baseColor = colorPicker.value;
                    ctx.strokeStyle = baseColor;
                    ctx.lineWidth = brushThickness.value;
                    
                    // High performance crisp neon glow configuration
                    ctx.shadowColor = baseColor;
                    ctx.shadowBlur = parseInt(brushThickness.value) * 1.2;
                    
                    ctx.stroke();
                }
                
                lastX = currentX;
                lastY = currentY;
                isDrawing = true;

            } else if (gesture === 'erase') {
                statusBadge.textContent = 'Erasing';
                statusBadge.className = 'status-erase';
                
                const eraseRadius = parseInt(brushThickness.value) * 3.5; 
                ctx.save();
                ctx.shadowBlur = 0; // Cut cleanly without shadow bleeding
                ctx.clearRect(currentX - eraseRadius/2, currentY - eraseRadius/2, eraseRadius, eraseRadius);
                ctx.restore();
                
                isDrawing = false;

            } else {
                statusBadge.textContent = 'Paused';
                statusBadge.className = 'status-pause';
                isDrawing = false;
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.65,
            minTrackingConfidence: 0.65
        });

        hands.onResults(onResults);

        // Optimizing video constraints to run smoothly on front-facing mobile cameras
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: { ideal: 640 },
            height: { ideal: 480 },
            facingMode: 'user'
        });
        
        camera.start().catch(err => {
            statusBadge.textContent = 'Error';
            statusBadge.className = 'status-erase';
            console.error(err);
        });
    </script>
</body>
</html>
